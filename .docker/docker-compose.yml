name: sgsa

services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: sgsa_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../www:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - sgsa-network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:alpine
    container_name: sgsa_web
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ../www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sgsa-network
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: sgsa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sgsa_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sgsa_user
      MYSQL_PASSWORD: secretpassword
    ports:
      - "33066:3306"
    volumes:
      - sgsa_db_data:/var/lib/mysql
    networks:
      - sgsa-network

  redis:
    image: redis:alpine
    container_name: sgsa_redis
    restart: unless-stopped
    ports:
      - "63799:6379"
    volumes:
      - sgsa_redis_data:/data
    networks:
      - sgsa-network

networks:
  sgsa-network:
    driver: bridge

volumes:
  sgsa_db_data:
  sgsa_redis_data:
